# Safe example configuration. Replace the model only after license and supply-chain review.
model:
  name: google/gemma-7b-it
  dtype: bfloat16
  trust_remote_code: false

data:
  train_file: sample-data/synthetic_examples.jsonl
  validation_file: sample-data/synthetic_examples.jsonl
  question_field: question
  answer_field: answer
  max_sequence_length: 2048

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/gemma-7b-cybersecurity
  epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.00002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  gradient_checkpointing: true
  logging_steps: 100
  # The historical run saved every 5,000 steps. This hardened example reduces
  # the recovery window for an environment with unreliable power.
  save_steps: 2000
  eval_steps: 2000
  save_total_limit: 5
  dataloader_num_workers: 4
  report_to: []
  seed: 42
  resume: auto

